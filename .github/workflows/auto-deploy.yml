name: Auto Deploy Trigger

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  empty_commit:
    runs-on: ubuntu-latest
    if: github.actor != 'techshare-project'
    steps:
      - name: Push to vercel
        uses: actions/checkout@v3

      - name: Push to vercel
        run: |
          git config user.email "projecttechshare@gmail.com"
          git config user.name "techshare-project"
          git commit --allow-empty -m "Push to vercel"
          git push
